<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Revengers Flashcards</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* Fundo Azul Celeste */
            color: #000000; /* Letras Pretas na página */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
        }

        .flashcard {
            width: 100%;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
            cursor: pointer;
        }

        .flashcard.flip {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 4px solid #D4AF37; /* Borda Dourada */
            background-color: #111111; /* Corpo do card Preto */
        }

        /* Box interno dourado para permitir Letras Pretas mantendo a estética */
        .content-box {
            background-color: #D4AF37; /* Fundo Dourado */
            color: #000000; /* Letras Pretas exigidas */
            padding: 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .back {
            transform: rotateY(180deg);
        }

        .back .content-box {
            background-color: #C5A028; /* Variação de dourado para a resposta */
        }

        .badge {
            position: absolute;
            top: 15px;
            font-size: 0.8rem;
            background-color: #000;
            color: #D4AF37;
            padding: 5px 10px;
            border: 1px solid #D4AF37;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            background-color: #111111;
            color: #D4AF37;
            border: 2px solid #D4AF37;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #D4AF37;
            color: #000000;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .hint {
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Tokyo Revengers Flashcards</h1>

    <div class="container">
        <div class="flashcard" id="card" onclick="flipCard()">
            <div class="front">
                <span class="badge">Pergunta</span>
                <div class="content-box" id="question-text">
                    Carregando pergunta...
                </div>
            </div>
            <div class="back">
                <span class="badge">Resposta</span>
                <div class="content-box" id="answer-text">
                    Carregando resposta...
                </div>
            </div>
        </div>
    </div>

    <p class="hint">Clique no cartão para virar!</p>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard()">Anterior</button>
        <button id="next-btn" onclick="nextCard()">Próximo</button>
    </div>

    <script>
        // Array com as 5 perguntas de Tokyo Revengers
        const flashcards = [
            {
                question: "Qual é o nome do protagonista que viaja no tempo em Tokyo Revengers?",
                answer: "Takemichi Hanagaki"
            },
            {
                question: "Quem é o fundador e primeiro líder máximo da Tokyo Manji (Toman)?",
                answer: "Manjiro Sano (Mikey)"
            },
            {
                question: "Qual ação física serve de gatilho para a viagem no tempo de Takemichi?",
                answer: "Apertar a mão de Naoto Tachibana"
            },
            {
                question: "Quem é o principal antagonista manipulador por trás da corrupção da Toman?",
                answer: "Tetta Kisaki"
            },
            {
                question: "Qual era o cargo de Ken Ryuguji (Draken) na gangue Toman?",
                answer: "Vice-líder (Vice-comandante)"
            }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const questionText = document.getElementById('question-text');
        const answerText = document.getElementById('answer-text');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function updateCard() {
            // Se o card já estiver virado, desvira antes de atualizar o texto
            if (cardElement.classList.contains('flip')) {
                cardElement.classList.remove('flip');
                setTimeout(() => {
                    renderContent();
                }, 300);
            } else {
                renderContent();
            }
        }

        function renderContent() {
            questionText.innerText = flashcards[currentIndex].question;
            answerText.innerText = flashcards[currentIndex].answer;
            
            // Gerencia ativação dos botões de controle
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === flashcards.length - 1;
        }

        function flipCard() {
            cardElement.classList.toggle('flip');
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // Inicialização do aplicativo
        renderContent();
    </script>
</body>
</html>
